<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binomial Pro | DevTheyanko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        body { background: #f0f2f5; min-height: 100vh; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto glass rounded-[2rem] shadow-xl p-8">
        <header class="mb-8">
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">BINOMIAL <span class="text-indigo-600">PRO</span></h1>
            <p class="text-gray-500 text-sm">Calculadora de rangos y acumulados</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase">Ensayos (n)</label>
                <input type="number" id="n" class="w-full p-4 bg-gray-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none border-none" value="10">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase">Probabilidad (p)</label>
                <input type="number" step="0.01" id="p" class="w-full p-4 bg-gray-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none border-none" value="0.5">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase">Tipo de Cálculo</label>
                <select id="tipo" class="w-full p-4 bg-gray-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none border-none" onchange="toggleRango()">
                    <option value="exacto">Exactamente k</option>
                    <option value="rango">Rango (de k1 a k2)</option>
                    <option value="minimo">Al menos k (mínimo)</option>
                    <option value="maximo">A lo sumo k (máximo)</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 mb-8" id="k-container">
            <div class="space-y-2">
                <label id="label-k1" class="text-xs font-bold text-gray-400 uppercase">Valor k</label>
                <input type="number" id="k1" class="w-full p-4 bg-gray-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none border-none" value="5">
            </div>
            <div id="k2-box" class="space-y-2 hidden">
                <label class="text-xs font-bold text-gray-400 uppercase">Hasta k2</label>
                <input type="number" id="k2" class="w-full p-4 bg-gray-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none border-none" value="7">
            </div>
        </div>

        <button onclick="ejecutar()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
            Calcular Distribución
        </button>

        <div id="res-container" class="mt-10 hidden">
            <div class="flex items-center justify-between mb-6 p-6 bg-white rounded-3xl border border-gray-100">
                <div>
                    <span class="text-gray-400 text-xs font-bold uppercase">Resultado</span>
                    <div id="final-val" class="text-4xl font-black text-indigo-600">0%</div>
                </div>
                <div class="text-right">
                    <span class="text-gray-400 text-xs font-bold uppercase">Media (μ)</span>
                    <div id="media-val" class="text-xl font-bold text-gray-700">0</div>
                </div>
            </div>

            <div class="space-y-3">
                <h4 class="text-sm font-bold text-gray-400 uppercase ml-2">Desglose de la suma</h4>
                <div id="log" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleRango() {
            const tipo = document.getElementById('tipo').value;
            const k2Box = document.getElementById('k2-box');
            const labelK1 = document.getElementById('label-k1');
            
            k2Box.classList.toggle('hidden', tipo !== 'rango');
            labelK1.innerText = tipo === 'rango' ? 'Desde k1' : 'Valor k';
        }

        function factorial(n) {
            let res = 1;
            for(let i=2; i<=n; i++) res *= i;
            return res;
        }

        function nCr(n, r) {
            if(r < 0 || r > n) return 0;
            return factorial(n) / (factorial(r) * factorial(n - r));
        }

        function binomial(n, k, p) {
            const comb = nCr(n, k);
            return comb * Math.pow(p, k) * Math.pow(1 - p, n - k);
        }

        function ejecutar() {
            const n = parseInt(document.getElementById('n').value);
            const p = parseFloat(document.getElementById('p').value);
            const tipo = document.getElementById('tipo').value;
            const k1 = parseInt(document.getElementById('k1').value);
            const k2 = parseInt(document.getElementById('k2').value);
            
            let totalP = 0;
            let listaK = [];

            if (tipo === 'exacto') listaK = [k1];
            else if (tipo === 'rango') for(let i=k1; i<=k2; i++) listaK.push(i);
            else if (tipo === 'minimo') for(let i=k1; i<=n; i++) listaK.push(i);
            else if (tipo === 'maximo') for(let i=0; i<=k1; i++) listaK.push(i);

            const log = document.getElementById('log');
            log.innerHTML = '';
            
            listaK.forEach(k => {
                const prob = binomial(n, k, p);
                totalP += prob;
                log.innerHTML += `
                    <div class="flex justify-between p-4 bg-white/50 rounded-xl text-sm border border-gray-100">
                        <span class="font-medium text-gray-500">P(X = ${k})</span>
                        <span class="font-mono font-bold">${(prob * 100).toFixed(4)}%</span>
                    </div>`;
            });

            document.getElementById('res-container').classList.remove('hidden');
            document.getElementById('final-val').innerText = (totalP * 100).toFixed(4) + "%";
            document.getElementById('media-val').innerText = (n * p).toFixed(2);
        }
    </script>
</body>
</html>
