<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binomial Calc | DevTheyanko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-gray-800">

    <div class="max-w-2xl mx-auto glass rounded-3xl shadow-2xl p-6 md:p-10">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-indigo-600">Calculadora Binomial</h1>
            <p class="text-gray-500">Paso a paso detallado</p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Ensayos (n)</label>
                <input type="number" id="n" class="w-full bg-white/50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 outline-none transition-all" placeholder="Ej: 5">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Éxitos (k)</label>
                <input type="number" id="k" class="w-full bg-white/50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 outline-none transition-all" placeholder="Ej: 3">
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Probabilidad éxito (p)</label>
                <input type="number" step="0.01" id="p" class="w-full bg-white/50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-400 outline-none transition-all" placeholder="Ej: 0.4">
            </div>
        </div>

        <button onclick="calcular()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all transform active:scale-95">
            Calcular Probabilidad
        </button>

        <div id="resultado" class="mt-10 hidden animate-fade-in">
            <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 mb-6 text-center">
                <span class="block text-sm text-indigo-400 font-medium uppercase mb-1">Probabilidad Final</span>
                <h2 id="prob-final" class="text-5xl font-black text-indigo-700">0%</h2>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-gray-600">Procedimiento:</h3>
                <div id="pasos" class="space-y-3 text-sm text-gray-600">
                    </div>
            </div>
        </div>
    </div>

    <script>
        function factorial(num) {
            if (num < 0) return -1;
            else if (num == 0) return 1;
            else return (num * factorial(num - 1));
        }

        function combinacion(n, k) {
            return factorial(n) / (factorial(k) * factorial(n - k));
        }

        function calcular() {
            const n = parseInt(document.getElementById('n').value);
            const k = parseInt(document.getElementById('k').value);
            const p = parseFloat(document.getElementById('p').value);
            const q = 1 - p;

            if (isNaN(n) || isNaN(k) || isNaN(p) || k > n) {
                alert("Por favor, revisa que los datos sean correctos y que k no sea mayor a n.");
                return;
            }

            const comb = combinacion(n, k);
            const pk = Math.pow(p, k);
            const qnk = Math.pow(q, n - k);
            const resultadoFinal = comb * pk * qnk;

            // Mostrar resultados
            document.getElementById('resultado').classList.remove('hidden');
            document.getElementById('prob-final').innerText = (resultadoFinal * 100).toFixed(4) + "%";

            // Limpiar y escribir pasos
            const pasosDiv = document.getElementById('pasos');
            pasosDiv.innerHTML = `
                <div class="p-4 bg-white/40 rounded-xl border border-white">
                    <strong>Paso 1: Variables.</strong> n=${n}, k=${k}, p=${p}, q=${q.toFixed(2)}
                </div>
                <div class="p-4 bg-white/40 rounded-xl border border-white">
                    <strong>Paso 2: Combinatorio.</strong> C(${n},${k}) = ${comb} formas distintas.
                </div>
                <div class="p-4 bg-white/40 rounded-xl border border-white">
                    <strong>Paso 3: Potencias.</strong> p^k = ${pk.toFixed(6)} | q^(n-k) = ${qnk.toFixed(6)}
                </div>
                <div class="p-4 bg-white/40 rounded-xl border border-white">
                    <strong>Paso 4: Multiplicación.</strong> ${comb} × ${pk.toFixed(6)} × ${qnk.toFixed(6)} = ${resultadoFinal.toFixed(6)}
                </div>
            `;
        }
    </script>
</body>
</html>
